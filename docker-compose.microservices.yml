version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: um-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: umevent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d umevent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: um-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: um-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:3.7
    container_name: um-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: um-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  jaeger:
    image: jaegertracing/all-in-one:1.61
    container_name: um-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: um-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.3
    container_name: um-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  api-gateway:
    image: umevent/api-gateway:latest
    profiles: ["apps"]
    depends_on:
      - redis
    ports:
      - "8080:8080"

  identity-service:
    image: umevent/identity-service:latest
    profiles: ["apps"]
    depends_on:
      - postgres
      - kafka

  event-service:
    image: umevent/event-service:latest
    profiles: ["apps"]
    depends_on:
      - postgres
      - kafka

  minutes-service:
    image: umevent/minutes-service:latest
    profiles: ["apps"]
    depends_on:
      - postgres
      - kafka

  planning-service:
    image: umevent/planning-service:latest
    profiles: ["apps"]
    depends_on:
      - postgres
      - kafka

  integration-service:
    image: umevent/integration-service:latest
    profiles: ["apps"]
    depends_on:
      - kafka

  notification-service:
    image: umevent/notification-service:latest
    profiles: ["apps"]
    depends_on:
      - kafka

  analytics-service:
    image: umevent/analytics-service:latest
    profiles: ["apps"]
    depends_on:
      - postgres
      - kafka

volumes:
  postgres_data:
  redis_data:
  grafana_data:
