global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8081"]

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-service:8082"]

  - job_name: minutes-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["minutes-service:8083"]

  - job_name: planning-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["planning-service:8084"]

  - job_name: integration-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["integration-service:8086"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8087"]

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["analytics-service:8088"]
