server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: pointer
  profiles:
    active: dev # Default to dev
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 5
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:pointer}
      auto-offset-reset: earliest
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

app:
  google:
    driveFolderId: ${GOOGLE_DRIVE_FOLDER_ID:demo-folder}
    gmailQuery: ${GOOGLE_GMAIL_QUERY:subject:(event OR meeting)}
  gemini:
    apiKey: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-pro}
    baseUrl: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    temperature: ${GEMINI_TEMPERATURE:0.4}
    maxOutputTokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}

