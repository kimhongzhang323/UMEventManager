version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umevent-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/umevent
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - umevent-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umevent-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - umevent-network

  postgres:
    image: postgres:15-alpine
    container_name: umevent-postgres
    environment:
      POSTGRES_DB: umevent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d umevent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - umevent-network

  redis:
    image: redis:7-alpine
    container_name: umevent-redis
    ports:
      - "6379:6379"
    networks:
      - umevent-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: umevent-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - umevent-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: umevent-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - umevent-network

volumes:
  pgdata:

networks:
  umevent-network:
    driver: bridge