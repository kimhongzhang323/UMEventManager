server:
  port: 8086

spring:
  application:
    name: integration-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: integration-service

app:
  google:
    driveFolderId: ${GOOGLE_DRIVE_FOLDER_ID:demo-folder}
    gmailQuery: ${GOOGLE_GMAIL_QUERY:subject:(event OR meeting)}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
