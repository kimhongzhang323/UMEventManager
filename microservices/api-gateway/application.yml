server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway, UMEvent-API-Gateway
      routes:
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/events/**
        - id: minutes-service
          uri: ${MINUTES_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/ai/minutes/**
        - id: planning-service
          uri: ${PLANNING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/plans/**
        - id: integration-service
          uri: ${INTEGRATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/google/**
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/analytics/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
